name: Uptime Monitor

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  check-uptime:
    runs-on: ubuntu-latest
    steps:
      - name: Check site availability
        id: check
        run: |
          # Fetch the homepage
          response=$(curl -s -o /tmp/response.html -w "%{http_code}" https://www.esdeveniments.cat)
          
          # Check HTTP status code
          if [ "$response" != "200" ]; then
            echo "❌ Site returned HTTP $response instead of 200"
            echo "error_message=Site returned HTTP $response instead of 200" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Check for keyword to ensure page rendered correctly
          if ! grep -q "esdeveniments.cat" /tmp/response.html; then
            echo "❌ Keyword 'esdeveniments.cat' not found in page content"
            echo "error_message=Keyword 'esdeveniments.cat' not found in page content" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Probe the image proxy with a first-party static asset. A May 2026
          # dispatcher regression 502'd every proxied image while the homepage
          # stayed 200, so a homepage-only check would have missed it. Using our
          # own static image (not a third party) means a failure here is our
          # proxy, not a flaky upstream. Retry to absorb transient blips.
          IMG="https://www.esdeveniments.cat/static/icons/icon-512x512.png"
          PROXY="https://www.esdeveniments.cat/api/image-proxy?url=$(printf '%s' "$IMG" | sed 's/:/%3A/g; s|/|%2F|g')&w=64&q=50"
          proxy_ok=""
          for attempt in 1 2 3; do
            code=$(curl -s -D /tmp/proxy.head -o /dev/null -w "%{http_code}" \
              -H "Accept: image/webp,image/*" --max-time 20 "$PROXY")
            ctype=$(grep -i '^content-type:' /tmp/proxy.head | tail -1 | tr -d '\r')
            if [ "$code" = "200" ] && echo "$ctype" | grep -qi 'image/'; then
              proxy_ok="yes"
              break
            fi
            echo "⚠️ image-proxy attempt $attempt: HTTP $code, $ctype"
            sleep 5
          done
          if [ -z "$proxy_ok" ]; then
            echo "❌ Image proxy is broken (last: HTTP $code, $ctype)"
            echo "error_message=Image proxy returned HTTP $code ($ctype) for a known-good first-party image — the proxy is broken" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "✅ Site is up, content is valid, and image proxy is serving images"

      - name: Send email notification on failure
        if: failure()
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "🚨 Site Down Alert: esdeveniments.cat"
          to: ${{ secrets.UPTIME_ALERT_EMAIL }}
          from: ${{ secrets.SMTP_FROM }}
          body: |
            <h2>🚨 Site Down Alert</h2>
            <p>The uptime monitor detected that <strong>esdeveniments.cat</strong> is down or not responding correctly.</p>
            
            <h3>Details</h3>
            <ul>
              <li><strong>Error:</strong> ${{ steps.check.outputs.error_message || 'Unknown error - check workflow logs' }}</li>
              <li><strong>Time:</strong> ${{ github.run_started_at }}</li>
              <li><strong>Workflow Run:</strong> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View in GitHub</a></li>
            </ul>
            
            <h3>Action Required</h3>
            <p>Please check the site immediately: <a href="https://www.esdeveniments.cat">https://www.esdeveniments.cat</a></p>
            
            <p><small>This is an automated alert from the GitHub Actions uptime monitor.</small></p>
          content_type: text/html
