# Auto-merge low-risk Dependabot PRs after CI passes
# GitHub Actions updates are typically safe - CI will catch any issues
# https://docs.github.com/en/code-security/dependabot/working-with-dependabot/automating-dependabot-with-github-actions

name: Dependabot auto-merge
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    # Security: verify both actor AND repository to prevent forks from triggering
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'Esdeveniments/esdeveniments-frontend'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        # Pin to specific commit hash for security (recommended by GitHub)
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Auto-merge GitHub Actions updates
        if: steps.metadata.outputs.package-ecosystem == 'github_actions'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # npm patch + minor auto-merge (any dependency-type).
      # Safety: branch protection on main/develop must require the e2e + quality
      # checks. `gh pr merge --auto` queues the merge and only completes when
      # all required checks pass. Production majors are still gated below.
      - name: Auto-merge npm patch and minor updates
        if: |
          steps.metadata.outputs.package-ecosystem == 'npm_and_yarn' &&
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
           steps.metadata.outputs.update-type == 'version-update:semver-minor')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # npm major auto-merge ONLY for dev-dependencies (e.g. @types/*,
      # lint-staged, test tooling). Green CI is a strong signal for dev deps
      # because they don't ship to production. Production majors (react, next,
      # zod, sentry, etc.) still require human review.
      - name: Auto-merge npm dev-dependency major updates
        if: |
          steps.metadata.outputs.package-ecosystem == 'npm_and_yarn' &&
          steps.metadata.outputs.update-type == 'version-update:semver-major' &&
          steps.metadata.outputs.dependency-type == 'direct:development'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
