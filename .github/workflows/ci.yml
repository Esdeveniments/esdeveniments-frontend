name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal default token scope. Jobs that need more (none here) must opt in explicitly.
permissions:
  contents: read

env:
  NODE_VERSION: "22"
  # Single source of truth for CI: set in GitHub Settings > Variables > Repository variables
  NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://api.esdeveniments.cat/api' }}

jobs:
  quality:
    name: Code quality, tests, and build
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Configure Yarn
        run: |
          yarn config set enableImmutableInstalls false
      - name: Cache Next.js build cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/yarn.lock') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/yarn.lock') }}-
      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn typecheck

      - name: Check i18n translations
        run: yarn i18n:check

      - name: Validate i18n placeholders
        run: yarn i18n:validate

      - name: Run unit tests with coverage (Vitest)
        env:
          CI: true
        run: yarn test:coverage

      - name: Generate service worker (prebuild)
        env:
          BUILD_VERSION: ${{ github.sha }}
        run: yarn prebuild

      - name: Build application
        env:
          NODE_ENV: production
          HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
        run: yarn build

      - name: Analyze bundle sizes (JSON)
        run: node scripts/analyze-bundles-cli.mjs --format json > bundle-sizes.json

      - name: Compare bundle sizes against baseline
        run: node scripts/compare-bundle-sizes.mjs --baseline bundle-size-baseline.json --current bundle-sizes.json

      - name: Upload bundle sizes report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: bundle-sizes
          path: bundle-sizes.json
          retention-days: 14

  lighthouse:
    name: Lighthouse CI (regression tripwire)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 25

    env:
      LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Configure Yarn
        run: |
          yarn config set enableImmutableInstalls false

      - name: Install dependencies
        run: yarn install --immutable

      - name: Generate service worker (prebuild)
        env:
          BUILD_VERSION: ${{ github.sha }}
        run: yarn prebuild

      - name: Build application
        env:
          NODE_ENV: production
        run: yarn build

      - name: Run Lighthouse CI
        env:
          NODE_ENV: production
        run: yarn lighthouse:ci

      - name: Upload Lighthouse reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: lighthouseci-report
          path: .lighthouseci/
          retention-days: 14
          if-no-files-found: ignore

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 35

    # deployments: read is required so we can query the Vercel-GitHub integration's
    # deployment status via `gh api` and reuse its preview URL.
    permissions:
      contents: read
      deployments: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Configure Yarn
        run: |
          yarn config set enableImmutableInstalls false

      - name: Install dependencies
        run: yarn install --immutable

      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/yarn.lock') }}

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Wait for Vercel preview deployment
        # Reuse the preview already created by the Vercel-GitHub integration
        # (visible as the "Vercel Preview Comments" / vercel[bot] deployment on
        # the PR) instead of redeploying via the CLI. This removes the need for
        # VERCEL_TOKEN/ORG_ID/PROJECT_ID in CI and cuts ~2 min off every run.
        #
        # Note: STRIPE_*_TEST and TURSO_*_TEST values are no longer injected
        # per-deployment. For payment E2E (only runs on PRs targeting main) to
        # work, those values must be set as Preview-scoped env vars on the
        # Vercel project itself (named STRIPE_SECRET_KEY / STRIPE_WEBHOOK_SECRET
        # / TURSO_DATABASE_URL / TURSO_AUTH_TOKEN). Dependabot PRs target
        # develop and don't run payment tests, so this doesn't block them.
        if: github.event_name == 'pull_request'
        id: vercel_preview
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          MAX_WAIT=900   # 15 minutes total wait budget
          INTERVAL=15    # poll every 15s
          ELAPSED=0
          URL=""
          echo "Polling Vercel-GitHub integration for preview of $HEAD_SHA..."
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            DEPLOYMENTS=$(gh api "repos/$REPO/deployments?sha=$HEAD_SHA&per_page=30" 2>/dev/null || echo "[]")
            # Pick deployments created by vercel[bot] only.
            IDS=$(echo "$DEPLOYMENTS" | jq -r '.[] | select(.creator.login == "vercel[bot]") | .id')
            FAILED=""
            for ID in $IDS; do
              STATUS=$(gh api "repos/$REPO/deployments/$ID/statuses?per_page=1" 2>/dev/null || echo "[]")
              STATE=$(echo "$STATUS" | jq -r '.[0].state // empty')
              case "$STATE" in
                success)
                  URL=$(echo "$STATUS" | jq -r '.[0].environment_url // empty')
                  if [ -n "$URL" ]; then
                    break 2
                  fi
                  ;;
                failure|error)
                  FAILED="$ID:$STATE"
                  ;;
              esac
            done
            if [ -n "$FAILED" ] && [ -z "$URL" ]; then
              # Vercel reports failure but no other deployment succeeded yet —
              # keep polling briefly in case the integration retries, but if
              # this persists we'll fail out below at MAX_WAIT.
              echo "Vercel deployment $FAILED reported, waiting for retry..."
            fi
            echo "  ${ELAPSED}s elapsed, no successful Vercel preview yet..."
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          if [ -z "$URL" ]; then
            echo "::error::No successful Vercel preview found for $HEAD_SHA after ${MAX_WAIT}s."
            echo "::error::Check the Vercel-GitHub integration status on the PR."
            exit 1
          fi
          echo "Vercel preview ready: $URL"
          echo "PREVIEW_URL=$URL" >> $GITHUB_ENV
          echo "preview-url=$URL" >> $GITHUB_OUTPUT
      - name: Verify preview readiness
        if: ${{ env.PREVIEW_URL != '' }}
        id: readiness
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          echo "Verifying deployment at ${{ env.PREVIEW_URL }}"
          MAX_RETRIES=5
          RETRY=0
          while [ $RETRY -lt $MAX_RETRIES ]; do
            HTTP_CODE=$(curl -s --connect-timeout 5 --max-time 15 -o /tmp/readiness-resp.txt -w "%{http_code}" \
              -H "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}" \
              -H "x-vercel-set-bypass-cookie: true" \
              "${{ env.PREVIEW_URL }}/api/events?size=1" 2>/dev/null || echo "000")
            RESP=$(cat /tmp/readiness-resp.txt 2>/dev/null || true)
            if [ "$HTTP_CODE" = "200" ] && echo "$RESP" | head -c 1 | grep -q "{"; then
              echo "Preview is ready (HTTP $HTTP_CODE, valid JSON)"
              echo "ready=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Attempt $((RETRY + 1))/$MAX_RETRIES: HTTP $HTTP_CODE (body: $(echo "$RESP" | head -c 200))"
            RETRY=$((RETRY + 1))
            if [ $RETRY -lt $MAX_RETRIES ]; then
              sleep $((2 ** RETRY))
            fi
          done
          echo "::error::Preview API not ready after $MAX_RETRIES attempts (last HTTP $HTTP_CODE). Skipping E2E to avoid 30min timeout."
          echo "ready=false" >> $GITHUB_OUTPUT
      - name: Run E2E tests (Playwright) against Vercel Preview
        if: ${{ env.PREVIEW_URL != '' && steps.readiness.outputs.ready == 'true' }}
        env:
          CI: true
          PLAYWRIGHT_TEST_BASE_URL: ${{ env.PREVIEW_URL }}
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          # Enable payment E2E only on PRs targeting main — lets PRs to develop
          # iterate fast without hitting Stripe test mode every push.
          RUN_PAYMENT_E2E: ${{ github.event.pull_request.base.ref == 'main' && '1' || '' }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_TEST }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET_TEST }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL_TEST }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN_TEST }}
        run: yarn test:e2e -c playwright.remote.config.ts --workers=2

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore
