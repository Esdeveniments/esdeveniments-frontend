# Auto-route failing Dependabot PRs to GitHub Copilot coding agent.
#
# Flow:
#   1. CI workflow finishes with conclusion=failure
#   2. We detect the PR was opened by dependabot[bot]
#   3. Label the PR `ai-fix-requested`
#   4. Assign `copilot-swe-agent` so the coding agent picks it up and pushes fixes
#   5. Post a comment with a pointer to the failed run logs
#
# Idempotent: skips if the label is already present (Copilot already running).
# Pairs with `dependabot-auto-merge.yml` — that one merges patch/minor when CI
# passes; this one rescues failures. Majors stay manual either way.
#
# REQUIRED SECRET: COPILOT_AUTOFIX_PAT
#   The default GITHUB_TOKEN cannot assign agents (it's an App installation token;
#   GitHub returns: "Assigning agents is not supported with GitHub App installation
#   tokens. Use a user token (personal access token or OAuth token) instead.").
#   Create a fine-grained PAT with these permissions on this repo:
#     - "Pull requests": Read and write
#     - "Issues": Read and write
#     - "Metadata": Read
#   Then add it as repo secret `COPILOT_AUTOFIX_PAT`.
#   If the secret is missing, the workflow still labels + comments, and posts an
#   "ASSIGN MANUALLY" note for the human to do the assignment.

name: Dependabot AI fix

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  route-to-copilot:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]' &&
      github.repository == 'Esdeveniments/esdeveniments-frontend'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      RUN_ID: ${{ github.event.workflow_run.id }}
      RUN_URL: ${{ github.event.workflow_run.html_url }}
      HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
      COPILOT_BOT_ID: BOT_kgDOC9w8XQ
    steps:
      - name: Resolve PR for failed run
        id: pr
        run: |
          set -euo pipefail
          PR_NUMBER=$(gh api "repos/$REPO/actions/runs/$RUN_ID" \
            --jq '.pull_requests[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            # Fallback: look up by head branch (workflow_run sometimes omits pull_requests)
            PR_NUMBER=$(gh pr list -R "$REPO" --head "$HEAD_BRANCH" --state open \
              --json number --jq '.[0].number // empty')
          fi
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for run $RUN_ID (branch $HEAD_BRANCH); skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PR_NODE_ID=$(gh api "repos/$REPO/pulls/$PR_NUMBER" --jq '.node_id')
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "node_id=$PR_NODE_ID" >> "$GITHUB_OUTPUT"

      - name: Skip if already assigned to Copilot
        if: steps.pr.outputs.skip != 'true'
        id: gate
        run: |
          set -euo pipefail
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          HAS_LABEL=$(gh pr view "$PR_NUMBER" -R "$REPO" \
            --json labels --jq '.labels[].name' | grep -c '^ai-fix-requested$' || true)
          if [ "$HAS_LABEL" != "0" ]; then
            echo "Already labeled ai-fix-requested; Copilot is on it. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      # Skip major-version bumps — those need human review, not AI auto-fix.
      # AI fixes can mask real concerns (bundle bloat, behavior changes, API breaks).
      - name: Skip major-version bumps
        if: steps.pr.outputs.skip != 'true' && steps.gate.outputs.skip != 'true'
        id: major
        run: |
          set -euo pipefail
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          TITLE=$(gh pr view "$PR_NUMBER" -R "$REPO" --json title --jq '.title')
          # Match "from X.Y.Z to A.B.C" (also allows "v" prefix, pre-release suffixes)
          if echo "$TITLE" | grep -qiE 'from v?[0-9]+'; then
            FROM_MAJOR=$(echo "$TITLE" | sed -nE 's/.*from v?([0-9]+)\..*/\1/p')
            TO_MAJOR=$(echo "$TITLE" | sed -nE 's/.* to v?([0-9]+)\..*/\1/p')
            if [ -n "$FROM_MAJOR" ] && [ -n "$TO_MAJOR" ] && [ "$FROM_MAJOR" != "$TO_MAJOR" ]; then
              echo "Major bump detected: $FROM_MAJOR -> $TO_MAJOR. Skipping AI routing."
              gh label create needs-human-review --color FBCA04 \
                --description "Cannot be auto-merged — requires manual evaluation" \
                -R "$REPO" 2>/dev/null || true
              gh api "repos/$REPO/issues/$PR_NUMBER/labels" \
                -f "labels[]=needs-human-review" >/dev/null
              gh pr comment "$PR_NUMBER" -R "$REPO" --body "🛑 **Major version bump detected** ($FROM_MAJOR → $TO_MAJOR) — not auto-routed to Copilot.

          Major upgrades carry breaking changes, bundle-size cost, and behavior shifts that need human evaluation:
          - Is the new major's feature set worth the upgrade cost?
          - Are there breaking API changes affecting our code?
          - Does the bundle / runtime regress meaningfully?

          Review manually. If approved for upgrade, assign \`@copilot\` yourself with explicit migration guidance."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Ensure label exists
        if: steps.pr.outputs.skip != 'true' && steps.gate.outputs.skip != 'true' && steps.major.outputs.skip != 'true'
        run: |
          gh label create ai-fix-requested \
            --color BFD4F2 \
            --description "Routed to Copilot coding agent after CI failure" \
            -R "$REPO" 2>/dev/null || true

      - name: Apply label
        if: steps.pr.outputs.skip != 'true' && steps.gate.outputs.skip != 'true' && steps.major.outputs.skip != 'true'
        run: |
          gh api "repos/$REPO/issues/${{ steps.pr.outputs.number }}/labels" \
            -f "labels[]=ai-fix-requested" >/dev/null

      - name: Assign Copilot coding agent
        if: steps.pr.outputs.skip != 'true' && steps.gate.outputs.skip != 'true' && steps.major.outputs.skip != 'true'
        id: assign
        env:
          # PAT required: GitHub App installation tokens cannot assign agents.
          GH_TOKEN: ${{ secrets.COPILOT_AUTOFIX_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set +e
          OUT=$(gh api graphql \
            -f query='mutation($assignableId:ID!,$actorIds:[ID!]!){ replaceActorsForAssignable(input:{assignableId:$assignableId, actorIds:$actorIds}){ clientMutationId } }' \
            -F assignableId="${{ steps.pr.outputs.node_id }}" \
            -F actorIds="$COPILOT_BOT_ID" 2>&1)
          STATUS=$?
          echo "$OUT"
          if [ $STATUS -ne 0 ]; then
            if echo "$OUT" | grep -q "not supported with GitHub App installation tokens"; then
              echo "::warning::COPILOT_AUTOFIX_PAT secret missing or invalid. Falling back to comment-only mode."
              echo "assigned=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::Unexpected error assigning Copilot."
            exit 1
          fi
          echo "assigned=true" >> "$GITHUB_OUTPUT"

      - name: Comment with failure context
        if: steps.pr.outputs.skip != 'true' && steps.gate.outputs.skip != 'true' && steps.major.outputs.skip != 'true'
        run: |
          if [ "${{ steps.assign.outputs.assigned }}" = "true" ]; then
            ASSIGN_LINE="Copilot coding agent has been assigned and will start a session shortly."
          else
            ASSIGN_LINE="⚠️ Copilot was NOT auto-assigned (COPILOT_AUTOFIX_PAT secret missing or invalid). Please assign \`@copilot\` manually."
          fi
          BODY=$(cat <<EOF
          @copilot CI failed on this Dependabot PR. Please investigate and push a fix to the PR branch.

          ${ASSIGN_LINE}

          - Failed run: ${RUN_URL}
          - Inspect logs: \`gh run view ${RUN_ID} -R ${REPO} --log-failed\`
          - Branch: \`${HEAD_BRANCH}\`

          Guidance:
          - For lint/test/typecheck failures: fix in-place.
          - For deps with codemods (Tailwind v4, Next.js, etc.): run the official codemod, then resolve remaining issues.
          - For breaking API changes (Zod v4, ESLint v10, etc.): update call sites; do not downgrade the dependency.
          - Run \`yarn lint && yarn typecheck && yarn test\` locally before pushing.

          Once green, the existing dependabot-auto-merge workflow will auto-merge patch/minor bumps. Majors still require human review.
          EOF
          )
          gh pr comment "${{ steps.pr.outputs.number }}" -R "$REPO" --body "$BODY"
