name: Rollback (SST)

# Manual-only — triggered from Actions UI or gh CLI:
#   gh workflow run rollback-sst.yml
#   gh workflow run rollback-sst.yml -f commit_sha=abc123
on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (leave empty → last-successful-deploy tag)"
        required: false
        default: ""

concurrency:
  group: deploy-sst-refs/heads/main # Same group as deploy — prevents race conditions
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  NODE_VERSION: "22"
  AWS_REGION: "eu-west-3"

jobs:
  rollback:
    name: Rollback production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://www.esdeveniments.cat

    steps:
      - name: Resolve target commit
        id: target
        run: |
          INPUT_SHA="${{ github.event.inputs.commit_sha }}"
          if [ -n "$INPUT_SHA" ]; then
            echo "sha=$INPUT_SHA" >> "$GITHUB_OUTPUT"
            echo "🎯 Rolling back to commit: $INPUT_SHA"
          else
            # Fetch the last-successful-deploy tag
            TAG_SHA=$(gh api repos/${{ github.repository }}/git/ref/tags/last-successful-deploy --jq '.object.sha' 2>/dev/null || echo "")
            if [ -z "$TAG_SHA" ]; then
              echo "::error::No commit_sha provided and 'last-successful-deploy' tag not found. Cannot rollback."
              exit 1
            fi
            echo "sha=$TAG_SHA" >> "$GITHUB_OUTPUT"
            echo "🎯 Rolling back to last-successful-deploy: $TAG_SHA"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout target commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.sha }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Configure Yarn
        run: yarn config set enableImmutableInstalls false

      - name: Install dependencies
        run: yarn install --immutable

      - name: Clean build artifacts
        run: |
          rm -rf .next .sst .open-next
          echo "✅ Cleaned build artifacts"

      - name: Remove system Pulumi (use SST bundled version)
        run: |
          sudo rm -f /usr/local/bin/pulumi* || true
          rm -rf ~/.pulumi/bin || true
          echo "✅ Removed system Pulumi"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create .env.production file
        env:
          NEXT_PUBLIC_GOOGLE_ANALYTICS: ${{ secrets.NEXT_PUBLIC_GOOGLE_ANALYTICS }}
          NEXT_PUBLIC_GOOGLE_ADS: ${{ secrets.NEXT_PUBLIC_GOOGLE_ADS }}
          NEXT_PUBLIC_GOOGLE_MAPS: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS }}
          NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ secrets.NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          NEXT_PUBLIC_TIKTOK_CLIENT_KEY: ${{ secrets.NEXT_PUBLIC_TIKTOK_CLIENT_KEY }}
          NEXT_PUBLIC_TIKTOK_REDIRECT_URI: ${{ secrets.NEXT_PUBLIC_TIKTOK_REDIRECT_URI }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          # Mask sensitive values
          echo "::add-mask::$HMAC_SECRET"
          echo "::add-mask::$NEXT_PUBLIC_API_URL"
          echo "::add-mask::$SENTRY_DSN"
          echo "::add-mask::$DEEPL_API_KEY"
          echo "::add-mask::$SENTRY_AUTH_TOKEN"
          echo "::add-mask::$REVALIDATE_SECRET"
          echo "::add-mask::$CLOUDFLARE_API_TOKEN"
          echo "::add-mask::$GOOGLE_PLACES_API_KEY"
          echo "::add-mask::$STRIPE_SECRET_KEY"
          echo "::add-mask::$STRIPE_WEBHOOK_SECRET"
          echo "::add-mask::$TIKTOK_CLIENT_SECRET"
          echo "::add-mask::$TURSO_AUTH_TOKEN"

          touch .env.production

          # Required secrets — fail fast if missing
          for VAR in NEXT_PUBLIC_API_URL HMAC_SECRET SENTRY_DSN DEEPL_API_KEY \
                     STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET \
                     TURSO_DATABASE_URL TURSO_AUTH_TOKEN; do
            eval VAL=\$$VAR
            if [ -z "$VAL" ]; then
              echo "::error::$VAR is required but not set"
              exit 1
            fi
            echo "$VAR=$VAL" >> .env.production
          done

          echo "NEXT_PUBLIC_SITE_URL=https://www.esdeveniments.cat" >> .env.production

          # Optional secrets — add if present
          for VAR in SENTRY_AUTH_TOKEN NEXT_PUBLIC_GOOGLE_ANALYTICS \
                     NEXT_PUBLIC_GOOGLE_ADS NEXT_PUBLIC_GOOGLE_MAPS \
                     NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION \
                     GOOGLE_PLACES_API_KEY REVALIDATE_SECRET \
                     CLOUDFLARE_ZONE_ID CLOUDFLARE_API_TOKEN \
                     NEXT_PUBLIC_TIKTOK_CLIENT_KEY NEXT_PUBLIC_TIKTOK_REDIRECT_URI \
                     TIKTOK_CLIENT_SECRET; do
            eval VAL=\$$VAR
            if [ -n "$VAL" ]; then
              echo "$VAR=$VAL" >> .env.production
            fi
          done

          echo "✅ .env.production created"

      - name: Generate service worker (prebuild)
        env:
          BUILD_VERSION: ${{ steps.target.outputs.sha }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SITE_URL: https://www.esdeveniments.cat
        run: yarn prebuild

      - name: Build Next.js application
        run: yarn build
        env:
          NODE_ENV: production

      - name: Deploy to AWS with SST (no staging — speed matters)
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          NODE_ENV: production
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          echo "🚨 ROLLBACK DEPLOY — skipping staging for speed"
          npx sst deploy --stage production

      - name: Post-deploy verification
        if: success()
        env:
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          set -uo pipefail
          FAIL=0

          echo "⏳ Waiting for CloudFront propagation..."
          sleep 30

          # Homepage
          if curl -sf --max-time 15 https://www.esdeveniments.cat/ > /dev/null; then
            echo "✅ Homepage OK"
          else
            echo "::error::Homepage FAILED"
            FAIL=1
          fi

          # Barcelona page
          if curl -sf --max-time 15 https://www.esdeveniments.cat/barcelona > /dev/null; then
            echo "✅ Barcelona page OK"
          else
            echo "::error::Barcelona page FAILED"
            FAIL=1
          fi

          # Sharp on arm64
          SHARP_RESPONSE=$(curl -sI --max-time 15 \
            "https://www.esdeveniments.cat/api/image-proxy?url=$(python3 -c 'import urllib.parse; print(urllib.parse.quote("https://picsum.photos/800/600.jpg"))')&w=400&q=50" \
            -H "Accept: image/webp,image/*" 2>/dev/null || echo "CURL_FAILED")

          if echo "$SHARP_RESPONSE" | grep -qi "CURL_FAILED"; then
            echo "::error::Image proxy unreachable"
            FAIL=1
          else
            OPTIMIZED=$(echo "$SHARP_RESPONSE" | grep -i "x-image-proxy-optimized" | tr -d '\r' | awk -F': ' '{print $2}')
            SHARP_STATUS=$(echo "$SHARP_RESPONSE" | head -1 | grep -oE '[0-9]{3}' | head -1)
            if [ "$SHARP_STATUS" = "502" ]; then
              echo "::warning::Test image service unavailable — skipping Sharp check"
            elif [ "$OPTIMIZED" = "fallback-sharp-error" ]; then
              echo "::error::Sharp BROKEN after rollback!"
              FAIL=1
            elif echo "$OPTIMIZED" | grep -qE "^(true|skipped-small|skipped-animated)$"; then
              echo "✅ Sharp working (optimized: ${OPTIMIZED})"
            else
              echo "::warning::Sharp status unclear (optimized: ${OPTIMIZED:-empty})"
            fi
          fi

          # Health endpoint
          HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" --max-time 10 \
            "https://www.esdeveniments.cat/api/health?secret=${REVALIDATE_SECRET}" || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Health endpoint OK"
          else
            echo "::error::Health endpoint returned HTTP ${HTTP_CODE}"
            FAIL=1
          fi

          if [ $FAIL -ne 0 ]; then
            echo "::error::❌ Rollback verification FAILED — manual intervention required"
            exit 1
          fi
          echo "✅ Rollback verification complete — all critical checks passed"

      - name: Rollback summary
        if: always()
        run: |
          echo "📋 Rollback details:"
          echo "   Target commit: ${{ steps.target.outputs.sha }}"
          echo "   Triggered by: ${{ github.actor }}"
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Rollback completed successfully"
          else
            echo "❌ Rollback failed — check logs above"
          fi
