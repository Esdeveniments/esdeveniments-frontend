nodeLinker: node-modules

# Install native binaries for current platform AND linux/arm64 (for Graviton2 Lambda).
# This ensures Sharp arm64 binaries exist in node_modules during build,
# so Turbopack can externalize them (serverExternalPackages in next.config.js).
# OpenNext then installs them into the Lambda bundle via open-next.config.ts.
supportedArchitectures:
  os:
    - current
    - linux
  cpu:
    - current
    - arm64
  libc:
    - current
    - glibc

yarnPath: .yarn/releases/yarn-4.12.0.cjs

packageExtensions:
  "@sentry/nextjs@*":
    peerDependencies:
      "@opentelemetry/api": "*"
      "@opentelemetry/context-async-hooks": "*"
      "@opentelemetry/core": "*"
      "@opentelemetry/sdk-trace-base": "*"
      react: "*"
      # webpack is provided by Next.js internally, no need to install
      webpack: "*"
